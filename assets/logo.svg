<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240">
  <!-- YADUA wordmark: rounded navy letterforms drawn as strokes, a blue
       comet-tail swoosh ring circling the D, a thin cyan accent arc and an
       orbiting dot above. -->
  <defs>
    <linearGradient id="ring" x1="300" y1="30" x2="430" y2="215"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3fc6ec"/>
      <stop offset="0.5" stop-color="#1e6cc0"/>
      <stop offset="1" stop-color="#143f86"/>
    </linearGradient>
  </defs>

  <!-- main swoosh: two arcs of different radii sharing endpoints -> tapered ring -->
  <path d="M294.0,69.8 A105,105 0 1 1 275.4,139.2 A99,99 0 1 0 294.0,69.8 Z"
        fill="url(#ring)"/>
  <!-- thin accent arc above (flatter inner arc -> shallow tapered sliver) -->
  <path d="M301.6,36.5 A122,122 0 0 1 375.7,8.1 A300,300 0 0 0 301.6,36.5 Z"
        fill="#4fc9ec"/>
  <!-- orbiting dot -->
  <circle cx="380" cy="16" r="12" fill="#142a4d"/>

  <!-- wordmark -->
  <g fill="none" stroke="#142a4d" stroke-width="30" stroke-linecap="round"
     stroke-linejoin="round">
    <!-- Y -->
    <path d="M105,72 L140,125 L175,72 M140,125 L140,182"/>
    <!-- A -->
    <path d="M222,182 L222,120 Q222,82 260,82 Q298,82 298,120 L298,182 M229,150 L291,150"/>
    <!-- D -->
    <path d="M345,82 L345,182 M345,82 L358,82 A50,50 0 0 1 358,182 L345,182"/>
    <!-- U -->
    <path d="M460,82 L460,140 A40,40 0 0 0 540,140 L540,82"/>
    <!-- A -->
    <path d="M582,182 L582,120 Q582,82 620,82 Q658,82 658,120 L658,182 M589,150 L651,150"/>
  </g>
</svg>
