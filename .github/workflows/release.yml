# ============================================================================
# Release workflow: build + publish YADUA binaries when a version tag is pushed.
#
#   git tag v1.2.3 && git push origin v1.2.3
#
# YADUA is Windows-only by nature (raw NTFS volume access via Win32 +
# a DirectX 11 GUI), so there are no Linux/macOS targets. We build both
# Windows architectures: amd64 (x64) and arm64 (cross-compiled with MSVC's
# amd64_arm64 toolchain, which the hosted runner image includes).
#
# Produced release assets (per tag, e.g. v1.2.3):
#   YADUA-setup-v1.2.3-windows-{amd64,arm64}.exe    installer (GUI + CLI,
#                                                   shortcuts, optional PATH)
#   YADUA-v1.2.3-windows-{amd64,arm64}-portable.zip portable: both exes,
#                                                   no install needed
#   SHA256SUMS.txt                                  checksums for all assets
# ============================================================================
name: Release

on:
  push:
    tags:
      - 'v*'          # v1.0.0, v2.3.1, v1.0.0-rc1, ...

# NOTE (supply-chain): the third-party actions below are pinned to full commit
# SHAs, not mutable tags, so a moved or compromised tag cannot inject code into
# the build - the update signature only attests "this came from our build", so
# a subverted build step would sign malware faithfully. The trailing "# vX"
# comments track the intended version; re-resolve the SHA when bumping, e.g.
#   gh api repos/actions/checkout/commits/v5 --jq .sha
permissions:
  contents: write     # release job creates the GitHub Release
  id-token: write     # build job: OIDC token for build-provenance attestation
  attestations: write # build job: record the provenance attestation

env:
  # GitHub switches actions to Node 24 by default on 2026-06-16; opt in now
  # so runs behave identically before and after the cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # --------------------------------------------------------------------------
  # Build both architectures in parallel on the hosted Windows runner.
  # --------------------------------------------------------------------------
  build:
    name: build windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # build.ps1 locates MSVC via vswhere and runs vcvarsall for the target
      # arch, then compiles the CLI, the Dear ImGui GUI, and the icon/version
      # resources. The tag (minus 'v') is stamped into VERSIONINFO - proper
      # version metadata also reduces antivirus false positives on unsigned
      # binaries.
      - name: Build (MSVC, ${{ matrix.arch }})
        shell: pwsh
        run: ./build.ps1 -Arch ${{ matrix.arch }} -Version ('${{ github.ref_name }}'.TrimStart('v'))

      # The amd64 binaries can run on the amd64 runner; make sure the CLI at
      # least starts and prints usage before we ship it. (arm64 can't execute
      # here, so it only gets the build itself as validation.)
      - name: Smoke test (amd64 only)
        if: matrix.arch == 'amd64'
        shell: pwsh
        run: |
          ./yadua.exe --help
          if ($LASTEXITCODE -ne 0) { throw "CLI smoke test failed" }

      # A portable zip and the Inno Setup installer (both contain GUI + CLI).
      # Inno Setup 6 is preinstalled on the hosted Windows runner image.
      - name: Stage release assets
        shell: pwsh
        run: |
          $tag  = '${{ github.ref_name }}'
          $ver  = $tag.TrimStart('v')
          $arch = '${{ matrix.arch }}'
          New-Item -ItemType Directory dist | Out-Null
          Compress-Archive -Path yadua-gui.exe, yadua.exe, LICENSE, README.md `
              -DestinationPath "dist/YADUA-$tag-windows-$arch-portable.zip"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /Qp `
              "/DAppVersion=$ver" "/DArch=$arch" "/DSrcDir=$PWD" installer\yadua.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }
          Get-ChildItem dist

      # Signed build-provenance attestation (SLSA) for each installer/zip, so
      # the artifacts can be traced to this workflow + commit independently of
      # the update signature. Verifiable with `gh attestation verify <file>`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Collect every architecture's binaries, checksum them, and publish a
  # GitHub Release for the tag.
  # --------------------------------------------------------------------------
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Needed for tools/sign-manifest.ps1 (the release job otherwise only
      # pulls artifacts, not the repo).
      - name: Check out the tagged commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true   # flatten binaries-amd64 + binaries-arm64

      # Build + sign the auto-update manifest (latest.yupd + latest.yupd.sig).
      # Skipped automatically until the YADUA_SIGNING_KEY secret is configured,
      # so releases keep working before the key exists. The private key lives
      # only in this secret and only in this job's memory.
      - name: Sign update manifest
        shell: pwsh
        env:
          YADUA_SIGNING_KEY: ${{ secrets.YADUA_SIGNING_KEY }}
        run: |
          $ver = '${{ github.ref_name }}'.TrimStart('v')
          ./tools/sign-manifest.ps1 -Version $ver -DistDir dist

      # Checksums let users verify their download; one file covering all assets
      # (including the signed manifest).
      - name: Generate SHA256SUMS.txt
        working-directory: dist
        run: sha256sum * | tee SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          # Auto-generate notes from merged PRs/commits since the last tag.
          generate_release_notes: true
          # Tags like v1.0.0-rc1 / v2.0.0-beta.2 become pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Fail loudly if a glob matched nothing instead of shipping a
          # half-empty release.
          fail_on_unmatched_files: true
